# =====================================================================
# ET-SSL Edge AI Traffic Anomaly Detection — Central Config
# Reference: Sattar et al., Scientific Reports 2025
# DOI: 10.1038/s41598-025-08568-0
# =====================================================================

# ---- Model artifacts paths ----
model:
  model_dir: "model/weights"
  encoder_fp32: "encoder_fp32.pt"
  encoder_int8: "encoder_int8.pt"
  encoder_onnx: "encoder_v5.onnx"
  mu_norm: "mu_norm.npy"
  delta_file: "delta.npy"
  config_file: "config.json"
  scaler: "scaler.pkl"          # Created when data is available; if missing, created from data

  # Encoder architecture (must match trained model)
  input_dim: 20
  hidden_dim: 256
  embed_dim: 64
  dropout: 0.2

# ---- Anomaly detection parameters ----
detection:
  delta: 105.68504333496094   # Anomaly threshold (from training); will be fine-tuned later
  kappa: 1.0                  # Sensitivity coefficient κ — set to 1.0 so effective delta = delta.npy; only increase after recalibration
  # score > delta → anomaly

# ---- Incremental learning ----
incremental:
  alpha: 0.99                 # Decay factor α: μ^(t+1) = α·μ^(t) + (1-α)·mean(z_normal)
  update_interval: 100        # Update μ_norm after every N confirmed normal flows
  min_normal_batch: 10        # Minimum normal flows to trigger update
  rollback_window: 10         # Number of μ_norm checkpoints to keep for rollback
  drift_rollback_threshold: 5.0  # Automatic rollback if |Δμ| exceeds threshold

# ---- Pipeline parameters ----
pipeline:
  time_window_sec: null       # OFF — use flow_timeout_sec to emit; prevents flow fragmentation
  flow_timeout_sec: 120       # Flow timeout if no new packets (120s to avoid fragmenting long-lived HTTPS)
  max_queue_size: 1000        # Max flows in inference queue
  batch_size: 32              # Inference batch size
  webhook_url: null           # Webhook URL for alerts (null = disabled)

# ---- Feature schema (in the order expected by the model) ----
features:
  names:
    - median_packets_delta_time
    - packets_IAT_mean
    - fwd_init_win_bytes
    - fwd_packets_IAT_mean
    - bwd_init_win_bytes
    - rst_flag_percentage_in_total
    - mode_packets_delta_time
    - bwd_packets_IAT_mean
    - rst_flag_counts
    - psh_flag_percentage_in_total
    - fwd_min_header_bytes
    - fwd_segment_size_min
    - skewness_payload_bytes_delta_len
    - payload_bytes_median
    - median_bwd_packets_delta_len
    - fwd_payload_bytes_median
    - mean_packets_delta_time
    - cov_bwd_payload_bytes_delta_len
    - mean_packets_delta_len
    - ack_flag_percentage_in_total

# ---- Dataset paths ----
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  # Dataset name mapping to subdirectories
  datasets:
    unsw_nb15:
      dir: "data/raw/unsw-nb15"
      label_col: "label"         # 0=normal, 1=attack
      label_normal_val: 0
    cic_darknet2020:
      dir: "data/raw/cic-darknet2020"
      label_col: "Label"
      label_normal_val: "BENIGN"
  # Split ratio
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

# ---- Benchmark ----
benchmark:
  n_warmup: 20
  n_runs: 1000
  batch_sizes: [1, 8, 32, 64, 128]
  cpu_limit_cores: null        # null = use all; set integer to simulate edge (e.g., 2)

# ---- Logging and output files ----
logging:
  log_dir: "logs"
  level: "INFO"                # DEBUG | INFO | WARNING
  mu_norm_log: "logs/mu_norm_history.npy"
  # Alert output (used in AlertManager)
  alert_log_path: "logs/alerts.jsonl"             # Append each JSON line on anomaly
  alert_summary_path: "logs/alerts_summary.json"  # Aggregate snapshot, loaded via json.load()
